<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 240px;
            background: #0f1117;
            color: #e2e8f0;
            font-family: 'Segoe UI', sans-serif;
            font-size: 13px;
            margin: 0;
        }

        .header {
            background: #1a1d2e;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .header h1 {
            font-size: 14px;
            color: #a78bfa;
            margin: 0;
        }

        .header p {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            margin: 3px 0 0;
        }

        .body {
            padding: 14px 16px;
        }

        .step {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.5;
        }

        .num {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(167, 139, 250, 0.2);
            color: #a78bfa;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>✦ Giải Thích Thuật Ngữ</h1>
        <p>Powered by Gemini AI</p>
    </div>
    <div class="body">
        <div class="step"><span class="num">1</span><span>Bôi đen bất kỳ từ nào trên trang web</span></div>
        <div class="step"><span class="num">2</span><span>Tooltip xuất hiện sau ~0.4 giây</span></div>
        <div class="step"><span class="num">3</span><span>Nhấn <b>Esc</b> hoặc nút Đóng để tắt</span></div>
    </div>
</body>

</html>
